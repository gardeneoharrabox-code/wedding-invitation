<!DOCTYPE html>
<html lang="id">
<head>
    <!-- meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">

    <!-- title -->
    <title>Undangan Pernikahan</title>

    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jim+Nightshade&family=Niconne&family=Playwrite+NO:wght@100..400&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,500;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,500;1,700;1,800;1,900&family=Bonheur+Royale&family=Cookie&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,500;1,700;1,800;1,900&family=Bonheur+Royale&family=Cinzel:wght@400..900&family=Cookie&family=Ovo&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,500;1,700;1,800;1,900&family=Bonheur+Royale&family=Cinzel:wght@400..900&family=Cookie&family=Geo:ital@0;1&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Jim+Nightshade&family=Ovo&family=Patrick+Hand+SC&family=Special+Elite&family=Tangerine:wght@400;700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PRELOADER -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <img src="img/message.png" class="preloader-logo" alt="logo">
            <div class="preloader-text">Loading...</div>
            <div class="preloader-bar">
                <div class="preloader-progress"></div>
            </div>
        </div>
    </div>

<!-- app -->
<div class="app">

    <!-- Fireflies -->
    <div class="fireflies"></div>

    <!-- Spotlight -->
    <div class="spotlight"></div>

    <!-- opening -->
    <section class="opening">

        <!-- top -->
        <div class="top">
            <h1 class="heading">Undangan Pernikahan</h1>
        </div>

        <!-- middle -->
        <div class="middle">
            <div class="inner-ornament">
                <span class="name-top">Febri</span>
                <span class="ampersand">&</span>
                <span class="name-bottom">Surya</span>
                        <!-- Wedding Date -->
                <p class="wedding-date" data-text="Minggu, 28 Juni 2026">Minggu, 28 Juni 2026</p>
            </div>
        </div>

       <!-- ornament bunga (kiri kanan tapi dekat tengah) -->
        <div class="flower-ornament">
            <img src="img/buket-hd.png" class="flower flower-left">
            <img src="img/buket-hd.png" class="flower flower-right">
        </div>

        <!-- bottom -->
        <div class="bottom">

            <button class="open-btn">
                <div class="envelope">
                    <span class="icon">✉</span>
                    <span>Buka Undangan</span>
                </div>
            </button>

            <div class="guest">
                <p class="guest-title">Tamu Undangan</p>
                <p class="guest-to">Kepada Yth</p>
                <p class="guest-name">Bapak/Ibu/Saudara/i</p>
            </div>
        </div>

    </section>

    <audio id="bg-music" loop>
        <source src="music/music.mp3" type="audio/mpeg">
    </audio>
</div>
<script src="script.js"></script>
</body>
</html>
