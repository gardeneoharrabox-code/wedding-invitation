<html lang="id">
<head>

  <title>Undangan Pernikahan</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <section class="opening">
    <div class="overlay"></div>

    <div class="particles"></div>

    <div class="bouquets"></div>

    <div class="flower-layer">
    <img src="img/buket-hd.png" class="flower flower-left">
    <img src="img/buket-hd.png" class="flower flower-right">
  </div>


    <div class="content">
      <h3>Undangan Pernikahan</h3>
      <img src="img/wedding-model.jpg" width="250" height="250" id="main-profile">

      <h1 class="couple">
      <span class="name">Febi</span>
      <span class="and">&</span>
      <span class="name">Surya</span>
    </h1>
      <p>Minggu, 28 Juni 2026</p>

      <div class="envelope-wrapper">
        <div class="envelope">
          <div class="flap"></div>
          <div class="open-text">BUKA UNDANGAN</div>
        </div>
      </div>


      <p class="kepada">Kepada Yth.</p>
      <p class="tamu" id="namaTamu">Bapak/Ibu/Saudara/i</p>
    </div>

    <div class="spotlight"></div>
    <audio id="bgm" loop>
      <source src="music/music.mp3" type="audio/mpeg">
    </audio>

    <div id="startScreen">
 
</div>

  </section>
  <script src="script.js"></script>
